name: aspnetauth0

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./src/Client-Credentias-Flow/server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore Client-Credentias-Flow.slnx

      - name: Check code formatting
        run: dotnet format Client-Credentias-Flow.slnx --verify-no-changes

      - name: Check package vulnerabilities
        run: dotnet list package --vulnerable --include-transitive 2>&1; exit 0

      - name: Build
        run: dotnet build Client-Credentias-Flow.slnx --no-restore --configuration Release -warnaserror

      - name: Run tests
        run: dotnet test Client-Credentias-Flow.slnx --no-build --configuration Release --verbosity normal

      - name: Publish application
        run: dotnet publish Client-Credentias-Flow.slnx --no-build --configuration Release -o publish
       

      - name: Restore API Gateway dependencies
        working-directory: ./src/Client-Credentias-Flow/ApiGateWay
        run: dotnet restore APIGateway.slnx

      - name: Check API Gateway code formatting
        working-directory: ./src/Client-Credentias-Flow/ApiGateWay
        run: dotnet format APIGateway.slnx --verify-no-changes

      - name: Check API Gateway package vulnerabilities
        working-directory: ./src/Client-Credentias-Flow/ApiGateWay
        run: dotnet list package --vulnerable --include-transitive 2>&1; exit 0

      - name: Build API Gateway
        working-directory: ./src/Client-Credentias-Flow/ApiGateWay
        run: dotnet build APIGateway.slnx --no-restore --configuration Release -warnaserror

      - name: Run API Gateway tests
        working-directory: ./src/Client-Credentias-Flow/ApiGateWay
        run: dotnet test APIGateway.slnx --no-build --configuration Release --verbosity normal

      - name: Publish API Gateway
        working-directory: ./src/Client-Credentias-Flow/ApiGateWay
        run: dotnet publish APIGateway.slnx --no-build --configuration Release -o publish
